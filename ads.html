<!DOCTYPE html>
<!--
  Documento de entrada usado no build (Rollup input).
  Mantém o ponto de montagem do React em #root.
-->
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Diagnóstico estratégico gratuito para otimizar anúncios em marketplaces e escalar performance."
    />
    <title>DiagnósticoAds</title>
    <link rel="icon" type="image/png" href="/01.png" />
  </head>

  <body>
    <div id="root"></div>
    <script src="./tracking.js"></script>
    <script>
      if (window.Tracking && !window.__trackingInitDone) {
        window.Tracking.init();
        window.__trackingInitDone = true;
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
