  
  <!DOCTYPE html>
  <!--
    Arquivo de entrada da landing page em ambiente local.
    Responsabilidades:
    1) Disponibilizar o container #root para o React.
    2) Inicializar o rastreamento de origem (Tracking.init).
    3) Carregar o bundle principal da aplicação via Vite.
  -->
  <html lang="pt-BR">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta
        name="description"
        content="Diagnóstico estratégico gratuito para otimizar anúncios em marketplaces e escalar performance."
      />
      <title>DiagnósticoAds</title>
      <link rel="icon" type="image/png" href="/01.png" />
    </head>

    <body>
      <div id="root"></div>
      <script src="./tracking.js"></script>
      <script>
        // Evita dupla inicializacao quando o script for injetado mais de uma vez.
        if (window.Tracking && !window.__trackingInitDone) {
          window.Tracking.init();
          // Flag global para tornar o bootstrap idempotente.
          window.__trackingInitDone = true;
        }
      </script>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
